<div class="bg-white shadow rounded-lg">
    <div class="px-4 py-5 sm:px-6 flex justify-between items-center">
        <h3 class="text-lg leading-6 font-medium text-gray-900">
            {% if is_new %}New User{% else %}Edit User{% endif %}
        </h3>
        <button onclick="document.getElementById('modal-container').classList.add('hidden')" class="text-gray-500 hover:text-gray-700">&times;</button>
    </div>
    
    {% if !error.is_empty() %}
    <div class="px-4 py-2 bg-red-50 border-l-4 border-red-500">
        <p class="text-sm text-red-700">{{ error }}</p>
    </div>
    {% endif %}

    <div class="border-t border-gray-200">
        <form id="user-form" method="POST" class="space-y-6 p-4">
            {% if !is_new %}
            <input type="hidden" name="id" value="{{ user.id }}">
            <div class="bg-gray-50 px-4 py-3 rounded-md">
                <p class="text-sm text-gray-500">Created: {{ user.created_at }}</p>
            </div>
            {% endif %}

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" name="email" id="email" required
                    value="{{ user.email }}"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
            </div>

            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" name="username" id="username" required
                    value="{{ user.username }}"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">
                    Password {% if !is_new %}(leave empty to keep current){% endif %}
                </label>
                <input type="password" name="password" id="password"
                    {% if is_new %}required{% endif %}
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
            </div>

            <div>
                <label for="role" class="block text-sm font-medium text-gray-700">Role</label>
                <select name="role" id="role" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border">
                    <option value="user" {% if !is_new && user.role == "user" %}selected{% endif %}>User</option>
                    <option value="admin" {% if !is_new && user.role == "admin" %}selected{% endif %}>Admin</option>
                </select>
            </div>

            <div class="flex items-center">
                <input type="checkbox" name="email_verified" id="email_verified" value="true"
                    {% if is_new || user.email_verified %}checked{% endif %}
                    class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                <label for="email_verified" class="ml-2 block text-sm text-gray-900">Email Verified</label>
            </div>

            <div class="flex justify-between pt-4">
                {% if !is_new %}
                <button type="submit" formaction="/admin/users/{{ user.id }}/delete"
                    hx-swap="outerHTML"
                    class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                    Delete
                </button>
                {% else %}
                <button type="button" onclick="document.getElementById('modal-container').classList.add('hidden')"
                    class="inline-flex justify-center py-2 px-4 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                    Cancel
                </button>
                {% endif %}
                <button type="submit"
                    {% if is_new %}
                    formaction="/admin/users/new"
                    hx-post="/admin/users/new"
                    {% else %}
                    formaction="/admin/users/{{ user.id }}/edit"
                    hx-post="/admin/users/{{ user.id }}/edit"
                    {% endif %}
                    hx-target="#users-table-body"
                    hx-swap="innerHTML"
                    hx-on::after-request="if(event.detail.successful) document.getElementById('modal-container').classList.add('hidden')"
                    class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    {% if is_new %}Create{% else %}Update{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
