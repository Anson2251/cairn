<tr>
    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ user.username }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ user.email }}</td>
    <td class="px-6 py-4 whitespace-nowrap">
        {% if user.role == "admin" %}
        <span class="px-2 py-1 text-xs font-medium rounded-full bg-purple-100 text-purple-800">Admin</span>
        {% else %}
        <span class="px-2 py-1 text-xs font-medium rounded-full bg-gray-100 text-gray-800">User</span>
        {% endif %}
    </td>
    <td class="px-6 py-4 whitespace-nowrap">
        {% if user.email_verified %}
        <span class="px-2 py-1 text-xs font-medium rounded-full bg-green-100 text-green-800">Yes</span>
        {% else %}
        <span class="px-2 py-1 text-xs font-medium rounded-full bg-yellow-100 text-yellow-800">No</span>
        {% endif %}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
        {% if user.trailblazer_seq.is_empty() %}-{% else %}{{ user.trailblazer_seq }}{% endif %}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ user.created_at }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
        <button hx-get="/admin/users/{{ user.id }}" hx-target="#modal-content" hx-swap="innerHTML" onclick="document.getElementById('modal-container').classList.remove('hidden')"
            class="text-indigo-600 hover:text-indigo-900">Edit</button>
    </td>
</tr>
