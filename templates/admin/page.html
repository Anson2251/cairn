<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Cairn</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen">
        <nav class="bg-white shadow">
            <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                <h1 class="text-xl font-bold text-gray-800">Cairn Admin</h1>
                <div class="flex items-center gap-4">
                    {% if is_default_admin %}
                    <span class="px-3 py-1 bg-red-100 text-red-700 text-sm font-medium rounded-full flex items-center gap-2">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                        </svg>
                        Default Admin
                    </span>
                    {% endif %}
                    <span class="text-gray-600">{{ username }} ({{ email }})</span>
                    <button class="text-blue-600 hover:underline" hx-post="/admin/logout" hx-target="body" x-swap="innerHTML" hx-confirm="Are you sure to logout?">Logout</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 py-8">
            <div class="mb-6">
                <div class="border-b border-gray-200">
                    <nav class="-mb-px flex space-x-8">
                        <button hx-get="/admin/invites" hx-target="#tab-content" hx-swap="innerHTML" data-active="true" class="[&:not([data-active='true'])]:border-transparent [&:not([data-active='true'])]:text-gray-500 hover:[&:not([data-active='true'])]:text-gray-700 hover:[&:not([data-active='true'])]:border-gray-300 border-blue-500 text-blue-600 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                            Invites
                        </button>
                        <button hx-get="/admin/users" hx-target="#tab-content" hx-swap="innerHTML" class="[&:not([data-active='true'])]:border-transparent [&:not([data-active='true'])]:text-gray-500 hover:[&:not([data-active='true'])]:text-gray-700 hover:[&:not([data-active='true'])]:border-gray-300 border-blue-500 text-blue-600 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                            Users
                        </button>
                        <button hx-get="/admin/stats" hx-target="#tab-content" hx-swap="innerHTML" class="[&:not([data-active='true'])]:border-transparent [&:not([data-active='true'])]:text-gray-500 hover:[&:not([data-active='true'])]:text-gray-700 hover:[&:not([data-active='true'])]:border-gray-300 border-blue-500 text-blue-600 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                            Stats
                        </button>
                    </nav>
                </div>
            </div>

            <div id="tab-content" class="bg-white rounded-lg shadow p-6">
                {% include "admin/invite_list.html" %}
            </div>
        </main>
    </div>

    <div id="modal-container" class="fixed inset-0 z-50 hidden">
        <div class="fixed inset-0 bg-gray-500/75 transition-opacity backdrop-blur-sm" onclick="document.getElementById('modal-container').classList.add('hidden')"></div>
        <div class="fixed inset-0 z-10 overflow-y-auto">
            <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
                <div id="modal-content" class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg">
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('htmx:beforeRequest', function(evt) {
            const btn = evt.detail.elt;
            if (btn.getAttribute('hx-target') === '#tab-content') {
                document.querySelectorAll("nav button[data-active]").forEach(b => b.removeAttribute('data-active'));
                btn.setAttribute('data-active', 'true');
            }
        });
    </script>
</body>
</html>
